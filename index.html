<!DOCTYPE html>
<html>
<head>
  <title>SREC Document Tracking System</title>

  <style>
    :root {
      --primary: #002147;
      --secondary: #1f4e79;
      --light-bg: #f4f6f9;
    }

    body {
      font-family: 'Segoe UI', sans-serif;
      margin: 0;
      background: var(--light-bg);
    }

    /* HEADER */
    .header {
      background: #2f6b55;
      padding: 12px 25px;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 20px;
    }

    .logo-box {
      background: white;
      padding: 6px 10px;
      border-radius: 10px;
    }

    .logo {
      height: 60px;
    }

    .system-title {
      color: white;
      font-size: 20px;
    }

    /* LAYOUT */
    .layout {
      display: flex;
    }

    /* SIDEBAR */
    .sidebar {
      width: 320px;
      background: var(--primary);
      color: white;
      height: calc(100vh - 80px);
      overflow-y: auto;
      padding: 15px;
    }

    input, select {
      width: 100%;
      padding: 10px;
      margin-top: 8px;
      margin-bottom: 15px;
      border-radius: 6px;
      border: 1px solid #ccc;
    }

    .doc-item {
      padding: 12px;
      margin-bottom: 12px;
      border-radius: 8px;
      color: white;
    }

    /* MAIN */
    .main {
      flex: 1;
      padding: 30px;
    }

    .content-card {
      background: white;
      padding: 25px;
      border-radius: 10px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.08);
    }

    h3 {
      margin-top: 30px;
    }

    button {
      background: var(--primary);
      color: white;
      padding: 10px 16px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }

    .timeline-item {
      padding: 8px;
      border-left: 3px solid var(--primary);
      margin-bottom: 8px;
      background: #eef3f9;
    }
  </style>
</head>

<body>

<header class="header">
  <div class="header-left">
    <div class="logo-box">
      <img src="logo.png" class="logo">
    </div>
    <div class="system-title">Document Movement Tracking System</div>
  </div>
</header>

<div class="layout">

<!-- SIDEBAR -->
<div class="sidebar">

<input id="search" placeholder="Search..." onkeyup="searchDocs()">

<div id="stats"></div>

<h4>📊 Active Documents</h4>
<div id="activeDocs"></div>

<h4>✅ Completed Documents</h4>
<div id="completedDocs"></div>

</div>

<!-- MAIN -->
<div class="main">
  <div class="content-card">

    <h2>📄 Document Tracking</h2>

    <h3>Create Document</h3>
    <input id="title" placeholder="Document Title">

    <select id="origin">
      <option>Aeronautical Engineering</option>
      <option>Biomedical Engineering</option>
      <option>Civil Engineering</option>
      <option>Mechanical Engineering</option>
      <option>ECE</option>
      <option>EEE</option>
      <option>EIE</option>
      <option>CSE</option>
      <option>IT</option>
      <option>AI & DS</option>
      <option>Robotics & Automation</option>
      <option>Science & Humanities</option>
    </select>

    <select id="category">
      <option>Approval</option>
      <option>Finance</option>
      <option>Academic</option>
      <option>Leave</option>
    </select>

    <button onclick="createDoc()">Create</button>

    <h3>Track Document</h3>
    <input id="trackId" placeholder="Tracking ID">
    <button onclick="trackDoc()">Track</button>

    <div id="result"></div>

    <h3>Update Status</h3>
    <input id="updateId" placeholder="Tracking ID">

    <select id="location">
      <option>HoD Office</option>
      <option>Principal Office</option>
      <option>Trust Office</option>
      <option>Accounts Office</option>
      <option>Controller of Examinations</option>
      <option>Academic Section</option>
      <option>Admission Office</option>
      <option>Placement Cell</option>
      <option>Library</option>
      <option>Research & Development Cell</option>
      <option>Student Affairs</option>
      <option>IQAC</option>
    </select>

    <select id="status">
      <option>Submitted</option>
      <option>Sent</option>
      <option>Received</option>
      <option>Under Review</option>
      <option>Approved</option>
      <option>Rejected</option>
      <option>Forwarded</option>
      <option>Completed</option>
    </select>

    <button onclick="updateDoc()">Update</button>

  </div>
</div>

</div>

<script>

// FORMAT TIME
function formatTime(date) {
  return new Date(date).toLocaleString();
}

// LOAD DASHBOARD
async function loadDashboard() {
  const res = await fetch(`/documents`);
  const docs = await res.json();

  let active = "";
  let completed = "";
  let completedCount = 0;

  docs.forEach(d => {
    const created = new Date(d.createdAt);
    const now = new Date();
    const days = (now - created) / (1000*60*60*24);

    let color = "#1f4e79";
    let label = "";

    if (d.status !== "Completed") {
      if (days > 5) {
        color = "crimson";
        label = "🔴 Delayed";
      } else if (days > 2) {
        color = "orange";
        label = "🟠 Pending";
      } else {
        label = "🟢 Normal";
      }
    }

    const lastUpdate = d.history[d.history.length - 1];

    const card = `
      <div class="doc-item" style="background:${color}">
        <b>${d.title}</b><br>
        ${d.trackingId}<br>

        📍 ${d.currentLocation}<br>
        ${d.status}<br>

        <small>${label}</small><br>
        <small>${Math.floor(days)} days</small><br>

        <small>Last Update:</small><br>
        <small>${formatTime(lastUpdate.timestamp)}</small>
      </div>
    `;

    if (d.status === "Completed") {
      completed += card;
      completedCount++;
    } else {
      active += card;
    }
  });

  document.getElementById("activeDocs").innerHTML = active;
  document.getElementById("completedDocs").innerHTML = completed;

  document.getElementById("stats").innerHTML =
    `Total: ${docs.length} | Completed: ${completedCount}`;
}

// CREATE
async function createDoc() {
  const res = await fetch(`/documents`, {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({
      title: document.getElementById('title').value,
      origin: document.getElementById('origin').value,
      category: document.getElementById('category').value
    })
  });

  const data = await res.json();
  alert("Tracking ID: " + data.trackingId);
  loadDashboard();
}

// TRACK (DETAILED TIMELINE)
async function trackDoc() {
  const id = document.getElementById('trackId').value;
  const res = await fetch(`/track/${id}`);
  const data = await res.json();

  let html = `
    <b>${data.title}</b><br>
    Status: ${data.status}<br>
    Current Location: ${data.currentLocation}<br><br>
    <b>History:</b><br>
  `;

  data.history.forEach(h => {
    html += `
      <div class="timeline-item">
        ${h.action} → ${h.location}<br>
        <small>${formatTime(h.timestamp)}</small>
      </div>
    `;
  });

  document.getElementById('result').innerHTML = html;
}

// UPDATE
async function updateDoc() {
  const id = document.getElementById('updateId').value;

  await fetch(`/update/${id}`, {
    method: 'PUT',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({
      status: document.getElementById('status').value,
      location: document.getElementById('location').value
    })
  });

  alert("Updated!");
  loadDashboard();
}

// SEARCH
async function searchDocs() {
  const query = document.getElementById("search").value.toLowerCase();
  const res = await fetch(`/documents`);
  const docs = await res.json();

  const filtered = docs.filter(d =>
    d.title.toLowerCase().includes(query) ||
    d.trackingId.toLowerCase().includes(query)
  );

  let html = "";

  filtered.forEach(d => {
    html += `
      <div class="doc-item">
        ${d.title} (${d.trackingId})
      </div>
    `;
  });

  document.getElementById("activeDocs").innerHTML = html;
}

// INITIAL LOAD
loadDashboard();

</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
  <title>SREC Document Tracking System</title>

  <style>
    :root {
      --primary: #2b5f4e;
      --secondary: #cbac49;
      --light-bg: #f4f6f9;
    }

    body {
      font-family: 'Segoe UI', sans-serif;
      margin: 0;
      background: var(--light-bg);
    }

    /* HEADER */
    .header {
      background: var(--primary);
      padding: 12px 25px;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 20px;
    }

    .logo-box {
  background: white;
  padding: 12px 20px;
  border-radius: 10px;
  display: flex;
  align-items: center;
}

    .logo {
  height: 95px;
  width: auto;
  display: block;
}

    .system-title {
      color: white;
      font-size: 20px;
      font-weight: 500;
    }

    /* LAYOUT */
    .layout {
      display: flex;
    }

    /* SIDEBAR */
    .sidebar {
      width: 300px;
      background: var(--primary);
      color: white;
      height: calc(100vh - 80px);
      overflow-y: auto;
      padding: 15px;
    }

    .doc-item {
      background: var(--secondary);
      padding: 10px;
      margin-bottom: 10px;
      border-radius: 6px;
    }

    .doc-item button {
      margin-top: 8px;
      background: crimson;
      border: none;
      padding: 5px;
      color: white;
      cursor: pointer;
      border-radius: 4px;
    }

    .doc-item button:hover {
      background: darkred;
    }

    /* MAIN */
    .main {
      flex: 1;
      padding: 30px;
    }

    input, select {
      width: 100%;
      padding: 10px;
      margin-top: 8px;
      margin-bottom: 15px;
      border-radius: 6px;
      border: 1px solid #ccc;
    }

    button {
      background: var(--primary);
      color: white;
      padding: 10px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }

    button:hover {
      background: var(--secondary);
    }

    .result-box {
      background: white;
      padding: 15px;
      margin-top: 15px;
      border-radius: 6px;
    }

    .timeline-item {
      padding: 8px;
      border-left: 3px solid var(--primary);
      margin-bottom: 8px;
      background: #eef3f9;
    }
  </style>
</head>

<body>

<!-- HEADER -->
<header class="header">
  <div class="header-left">
    <div class="logo-box">
      <img src="logo.png" class="logo">
    </div>
    <div class="system-title">Document Movement Tracking System</div>
  </div>
</header>

<div class="layout">

<!-- SIDEBAR -->
<div class="sidebar">
  <h3>📊 Active Documents</h3>
  <div id="dashboard"></div>
</div>

<!-- MAIN -->
<div class="main">

<h2>📄 Document Tracking</h2>

<h3>Create Document</h3>
<input id="title" placeholder="Document Title">

<select id="origin">
  <option>Aeronautical Engineering</option>
  <option>Biomedical Engineering</option>
  <option>Civil Engineering</option>
  <option>Mechanical Engineering</option>
  <option>ECE</option>
  <option>EEE</option>
  <option>EIE</option>
  <option>CSE</option>
  <option>IT</option>
  <option>AI & DS</option>
  <option>Robotics & Automation</option>
  <option>Science & Humanities</option>
</select>

<button onclick="createDoc()">Create</button>

<h3>Track Document</h3>
<input id="trackId" placeholder="Tracking ID">
<button onclick="trackDoc()">Track</button>

<div id="result" class="result-box"></div>

<h3>Update Status</h3>
<input id="updateId" placeholder="Tracking ID">

<select id="location">
  <option>HoD Office</option>
  <option>Principal Office</option>
  <option>Trust Office</option>
  <option>Accounts Office</option>
  <option>Controller of Examinations</option>
  <option>Academic Section</option>
  <option>Admission Office</option>
  <option>Placement Cell</option>
  <option>Library</option>
  <option>Research & Development Cell</option>
  <option>Student Affairs</option>
  <option>IQAC</option>
</select>

<select id="status">
  <option>Submitted</option>
  <option>Sent</option>
  <option>Received</option>
  <option>Under Review</option>
  <option>Approved</option>
  <option>Rejected</option>
  <option>Forwarded</option>
  <option>Completed</option>
</select>

<button onclick="updateDoc()">Update</button>

</div>
</div>

<script>

// LOAD DASHBOARD
async function loadDashboard() {
  const res = await fetch(`/documents`);
  const docs = await res.json();

  let html = "";

  docs.forEach(d => {
    html += `
      <div class="doc-item">
        <b>${d.title}</b><br>
        ${d.trackingId}<br>
        📍 ${d.currentLocation}<br>
        <small>${d.status}</small><br>
        <button onclick="deleteDoc('${d.trackingId}')">🗑 Delete</button>
      </div>
    `;
  });

  document.getElementById("dashboard").innerHTML = html;
}

// CREATE
async function createDoc() {
  const res = await fetch(`/documents`, {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({
      title: document.getElementById('title').value,
      origin: document.getElementById('origin').value
    })
  });

  const data = await res.json();
  alert("Tracking ID: " + data.trackingId);
  loadDashboard();
}

// TRACK
async function trackDoc() {
  const id = document.getElementById('trackId').value;
  const res = await fetch(`/track/${id}`);
  const data = await res.json();

  let html = `<b>${data.title}</b><br>Status: ${data.status}<br><br>`;

  data.history.forEach(h => {
    html += `<div class="timeline-item">${h.action} → ${h.location}</div>`;
  });

  document.getElementById('result').innerHTML = html;
}

// UPDATE
async function updateDoc() {
  const id = document.getElementById('updateId').value;

  await fetch(`/update/${id}`, {
    method: 'PUT',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({
      status: document.getElementById('status').value,
      location: document.getElementById('location').value
    })
  });

  alert("Updated!");
  loadDashboard();
}

// DELETE
async function deleteDoc(id) {
  if (!confirm("Delete this document?")) return;

  await fetch(`/documents/${id}`, {
    method: 'DELETE'
  });

  loadDashboard();
}

// INITIAL LOAD
loadDashboard();

</script>

</body>
</html>

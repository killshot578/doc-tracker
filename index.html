<!DOCTYPE html>
<html>
<head>
  <title>SREC Document Tracking System</title>
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      margin: 0;
      display: flex;
      background: #f4f6f9;
    }

    .sidebar {
      width: 300px;
      background: #002147;
      color: white;
      height: 100vh;
      overflow-y: auto;
      padding: 15px;
    }

    .sidebar h2 {
      font-size: 18px;
      margin-bottom: 15px;
    }

    .doc-item {
      background: #004080;
      padding: 10px;
      margin-bottom: 10px;
      border-radius: 5px;
      font-size: 13px;
    }

    .main {
      flex: 1;
      padding: 30px;
    }

    h1 {
      color: #002147;
    }

    input, select {
      width: 100%;
      padding: 10px;
      margin-top: 8px;
      margin-bottom: 15px;
      border-radius: 5px;
      border: 1px solid #ccc;
    }

    button {
      background: #002147;
      color: white;
      padding: 10px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }

    .result-box {
      background: #fff;
      padding: 15px;
      margin-top: 15px;
      border-radius: 5px;
    }

    .timeline-item {
      padding: 8px;
      border-left: 3px solid #002147;
      margin-bottom: 8px;
      background: #eef3f9;
    }
  </style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
  <h2>📊 Active Documents</h2>
  <div id="dashboard"></div>
</div>

<!-- MAIN -->
<div class="main">

<h1>📄 SREC Document Tracking System</h1>

<h3>Create Document</h3>
<input id="title" placeholder="Document Title">

<select id="origin">
  <option>Aeronautical Engineering</option>
  <option>CSE</option>
  <option>Mechanical Engineering</option>
</select>

<button onclick="createDoc()">Create</button>

<h3>Track Document</h3>
<input id="trackId" placeholder="Tracking ID">
<button onclick="trackDoc()">Track</button>

<div id="result" class="result-box"></div>

<h3>Update Status</h3>
<input id="updateId" placeholder="Tracking ID">

<select id="location">
  <option>HoD Office</option>
  <option>Principal Office</option>
  <option>Trust Office</option>
  <option>Accounts Office</option>
</select>

<select id="status">
  <option>Submitted</option>
  <option>Sent</option>
  <option>Received</option>
  <option>Approved</option>
</select>

<button onclick="updateDoc()">Update</button>

</div>

<script>
const BASE_URL = "";

// LOAD DASHBOARD
async function loadDashboard() {
  const res = await fetch(`${BASE_URL}/documents`);
  const docs = await res.json();

  let html = "";

  docs.forEach(d => {
  html += `
    <div class="doc-item">
      <b>${d.title}</b><br>
      ${d.trackingId}<br>
      📍 ${d.currentLocation}<br>
      <small>${d.status}</small><br><br>
      <button onclick="deleteDoc('${d.trackingId}')">🗑 Delete</button>
    </div>
  `;
});

  document.getElementById("dashboard").innerHTML = html;
}

// CREATE
async function createDoc() {
  const res = await fetch(`${BASE_URL}/documents`, {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({
      title: document.getElementById('title').value,
      origin: document.getElementById('origin').value
    })
  });

  const data = await res.json();
  alert("Tracking ID: " + data.trackingId);
  loadDashboard();
}

// TRACK
async function trackDoc() {
  const id = document.getElementById('trackId').value;
  const res = await fetch(`${BASE_URL}/track/${id}`);
  const data = await res.json();

  let html = `<b>${data.title}</b><br>Status: ${data.status}<br><br>`;

  data.history.forEach(h => {
    html += `<div class="timeline-item">${h.action} → ${h.location}</div>`;
  });

  document.getElementById('result').innerHTML = html;
}

// UPDATE
async function updateDoc() {
  const id = document.getElementById('updateId').value;

  await fetch(`${BASE_URL}/update/${id}`, {
    method: 'PUT',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({
      status: document.getElementById('status').value,
      location: document.getElementById('location').value
    })
  });

  alert("Updated!");
  loadDashboard();
}

// INITIAL LOAD
loadDashboard();
</script>

</body>
</html>
